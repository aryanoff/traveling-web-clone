<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Book Your Trip - Traveling Website</title>
  </head>
  <body>
    <header>
      <div class="bgimage">
      <nav class="navbar">
        <div class="logo">
          <img src="./assets/Travel logo.png" alt="Travel Logo" />
        </div>
        <ul class="nav-links">
          <li><a>Popular Places</a></li>
          <li><a>National Trips</a></li>
          <li><a>International Trips</a></li>
          <li><a>Contact</a></li>
        </ul>
        <button class="signup">Sign Up</button>
      </nav>

      <div class="herosection">
        <div class="hero-heading">
          <h1>Discover Your Vacation</h1>
          <div class="hero-subheading">
            <p>Explore the world with us and create unforgettable memories.</p>
          </div>
          <div class="hero-buttons">
            <button class="explore">Explore Destinations</button>
            <button class="booknow">Book Now</button>
          </div>
        </div>
      </div>
    </div>
    </header>
    <main>
      <section class="popular-places">
        <h2>Most Popular Places</h2>
        <div class="popularcards">
          <dif class="cards">imp</dif>
        </div>
      </section>
